body:
  text: 蘭盆經疏會古通今記序光嚴無際大師普觀述吾祖圭峯禪師之疏蘭盆也䆳古作者莫之與京講授流通為日固久石壁尊者剏為之記孤山法師因循其說廣演證義芝園津師亦繼有斯述自孤山新鈔之出而石壁舊記世不復行蓋以文華為尚也竊甞合諸輿本極思研精而和玉隋珠各矜其得矣良以乘教之有否臧文義之有斥的要乎盡美者為難能也前脩不云乎所冀後之病今亦猶今之視昔故余不揣膚受牽拙以訂之庶乎公議有所存耳因以會古通今榜其名題惟知我者且不以斆顰狂斐之為誚乎
